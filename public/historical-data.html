<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Data - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/auth-check.js" defer></script>
</head>

<body data-allowed-roles="advanced,admin">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-links">
                <button class="btn btn-text" onclick="window.location.href='advanced-dashboard.html'">Dashboard</button>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Historical Weather Query</h2>
        <div class="auth-card" style="max-width: 800px; margin-top: 20px;">
            <div class="form-group">
                <label>Select Location</label>
                <select>
                    <option>New York, NY</option>
                    <option>Seattle, WA</option>
                </select>
            </div>
            <div class="form-group">
                <label>Start Date</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date">
            </div>
            <button class="btn">Fetch History</button>

            <div style="margin-top: 30px; text-align: center; border: 1px dashed var(--border); padding: 40px;">
                <p>Chart Widget Area (e.g. Chart.js) would render graph here.</p>
            </div>
        </div>
    </main>
</body>

</html>
