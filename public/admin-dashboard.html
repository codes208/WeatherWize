<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/auth-check.js" defer></script>
</head>

<body data-allowed-roles="admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar" style="border-bottom: 2px solid var(--danger);">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-brand" style="color: var(--danger);">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-links">
                <button class="btn btn-text" onclick="window.location.href='admin-users.html'">Manage Users</button>
                <button class="btn btn-text" onclick="window.location.href='settings.html'">System Settings</button>
                <button class="btn btn-text" onclick="window.location.href='locations.html'">Locations</button>
                <button class="btn btn-text" onclick="window.location.href='profile.html'">Profile</button>
            </div>
            <div class="nav-right">
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Platform Analytics Overview</h2>

        <div class="hourly-grid" style="grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px;">
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: var(--text-secondary);">Total Active Users</h3>
                <div style="font-size: 3rem; font-weight: bold; color: var(--accent); margin-top: 10px;">1,248</div>
            </div>
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: var(--text-secondary);">API Calls (Today)</h3>
                <div style="font-size: 3rem; font-weight: bold; color: var(--accent); margin-top: 10px;">45K</div>
            </div>
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: var(--text-secondary);">Premium Subscribers</h3>
                <div style="font-size: 3rem; font-weight: bold; color: var(--success); margin-top: 10px;">312</div>
            </div>
        </div>

        <h3 style="margin-top: 50px;">Recent System Alerts</h3>
        <div class="location-card" style="margin-top: 15px; border-left: 4px solid var(--accent);">
            <h4>API Usage Spike Detected</h4>
            <p style="color: var(--text-secondary);">10 minutes ago - Traffic increased by 400% in US East Region.</p>
        </div>
    </main>
</body>

</html>
