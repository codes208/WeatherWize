<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/auth-check.js" defer></script>
</head>

<body data-allowed-roles="general,advanced,admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-right">
                <button class="btn btn-text" onclick="window.history.back()">Back</button>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Your Profile</h2>

        <div class="auth-card" style="max-width: 600px; margin-top: 30px;">
            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="current_user" disabled
                        style="background-color: var(--bg-primary); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="user@example.com">
                </div>
                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <input type="password" placeholder="Leave blank to keep current password">
                </div>
                <button type="submit" class="btn btn-block">Update Profile</button>
            </form>

            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);">
                <h3 style="color: var(--danger); margin-bottom: 15px;">Danger Zone</h3>
                <button class="btn btn-block"
                    style="background-color: transparent; border: 1px solid var(--danger); color: var(--danger);">Delete
                    Account</button>
            </div>
        </div>
    </main>
</body>

</html>
