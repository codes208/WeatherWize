<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/auth-check.js" defer></script>
    <script src="./js/profile.js" defer></script>
</head>

<body data-allowed-roles="general,advanced,admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-right">
                <button class="btn btn-text" onclick="window.history.back()">Back</button>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="auth-container" style="min-height: calc(100vh - 80px);">
        <div class="auth-card">
            <h2 class="auth-title">Your Profile</h2>
            <form id="profile-form">
                <div id="profile-message" class="text-center" style="margin-bottom: 15px; display: none;"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username-input" disabled>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email-input">
                </div>
                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <input type="password" id="password-input" placeholder="Leave blank to keep current password">
                </div>
                <button type="submit" class="btn btn-block">Update Profile</button>
            </form>

            <div class="danger-zone">
                <h3 style="margin-bottom: 15px;">Danger Zone</h3>
                <button class="btn btn-block btn-outline-danger">Delete Account</button>
            </div>
        </div>
    </main>
</body>

</html>
