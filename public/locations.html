<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Locations - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/auth-check.js" defer></script>
    <script src="./js/locations.js" defer></script>
</head>

<body data-allowed-roles="general,advanced,admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-right">
                <button class="btn btn-text" onclick="window.history.back()">Back</button>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Manage Saved Locations</h2>

        <div class="weather-search" style="margin-top: 20px;">
            <input type="text" id="add-location-input" placeholder="Add a new location...">
            <button id="add-location-btn" class="btn">Add</button>
        </div>

        <div id="locations-list" class="location-grid" style="grid-template-columns: 1fr; margin-top: 20px;"></div>
    </main>
</body>

</html>
