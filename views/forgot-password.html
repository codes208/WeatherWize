<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
</head>

<body class="register-page">
    <a href="./index.html" class="page-logo-link" aria-label="WeatherWize home">
        <img src="./images/weatherewize_logo.png" alt="WeatherWize logo" class="page-logo">
    </a>
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud still-cloud still-cloud-1"></div>
        <div class="cloud still-cloud still-cloud-2"></div>
        <div class="cloud still-cloud still-cloud-3"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Forgot Password</h2>
            <p class="account-choice-subtitle">Enter your username and we'll send reset instructions.</p>

            <form id="forgot-form">
                <div id="forgot-message" class="text-center hidden" style="margin-bottom: 15px;"></div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <button type="submit" class="btn btn-block">Send Reset Link</button>
            </form>

            <div class="auth-link">
                <p>Remember your password? <a href="./index.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const msgDiv = document.getElementById('forgot-message');

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                msgDiv.textContent = 'If an account with that username exists, reset instructions have been sent.';
                msgDiv.className = 'text-center text-success';
                e.target.reset();
            } catch (error) {
                msgDiv.textContent = 'Something went wrong. Please try again.';
                msgDiv.className = 'text-center text-danger';
            }
        });
    </script>
</body>

</html>
