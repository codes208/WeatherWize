<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Locations - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/toast.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth-check.js" defer></script>
    <script src="./js/locations.js" defer></script>
</head>

<body data-allowed-roles="general,advanced" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/dashboard" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo">
                WeatherWize
            </a>
            <div class="nav-right">
                <a href="profile.html" id="username-display"></a>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Manage Saved Locations</h2>

        <div class="weather-search location-search">
            <input type="text" id="add-location-input" placeholder="e.g. Seattle, Washington">
            <button id="add-location-btn" class="btn">Add</button>
        </div>
        <span id="location-msg" class="location-msg"></span>

        <div id="locations-list" class="location-grid"></div>
    </main>
</body>

</html>
