<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - WeatherWize</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/toast.js"></script>
    <script src="./js/auth-check.js" defer></script>
    <script src="./js/admin-dashboard.js" defer></script>
</head>

<body data-allowed-roles="admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="admin-dashboard.html" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo"
                    style="display:inline-block; vertical-align:middle;">
                WeatherWize
            </a>
            <div class="nav-links">
                <button class="btn btn-text" onclick="window.location.href='admin-users.html'">Manage Users</button>
                <button class="btn btn-text" onclick="window.location.href='settings.html'">System Settings</button>
            </div>
            <div class="nav-right">
                <a href="profile.html" id="username-display" style="font-weight: bold; text-decoration: none;"></a>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>Platform Analytics Overview</h2>

        <div class="hourly-grid" style="grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px;">
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: black;">Total Active Users</h3>
                <div id="stat-total-users"
                    style="font-size: 3rem; font-weight: bold; color: var(--accent); margin-top: 10px;">—</div>
            </div>
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: black;">Premium Subscribers</h3>
                <div id="stat-premium-users"
                    style="font-size: 3rem; font-weight: bold; color: var(--success); margin-top: 10px;">—</div>
            </div>
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: black;">Saved Locations</h3>
                <div id="stat-total-locations"
                    style="font-size: 3rem; font-weight: bold; color: var(--accent); margin-top: 10px;">—</div>
            </div>
            <div class="hourly-card" style="text-align: center; padding: 30px;">
                <h3 style="color: black;">Suspended Users</h3>
                <div id="stat-suspended-users"
                    style="font-size: 3rem; font-weight: bold; color: var(--danger); margin-top: 10px;">—</div>
            </div>
        </div>

        <h3 style="margin-top: 50px;">Recent System Alerts</h3>
        <div id="system-alerts-list">
            <p style="color: var(--text-secondary);">Loading...</p>
        </div>
    </main>
</body>

</html>
