<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - WeatherWize Admin</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/weatherWize.CSS">
    <script src="./js/toast.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth-check.js" defer></script>
    <script src="./js/admin.js" defer></script>
</head>

<body data-allowed-roles="admin" class="dashboard-page">
    <div class="sky-wrap" aria-hidden="true">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/dashboard" class="nav-brand">
                <img src="./images/weatherewize_logo.png" alt="WeatherWize Logo" class="nav-logo">
                WeatherWize
            </a>
            <div class="nav-right">
                <a href="profile.html" id="username-display"></a>
                <button id="logout-btn" class="btn" onclick="window.location.href='index.html'">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container dashboard-content">
        <h2>User Management</h2>

        <div class="weather-search user-search-bar">
            <input type="text" id="user-search-input" placeholder="Search users by username or email...">
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated dynamically by admin.js -->
            </tbody>
        </table>
        </div>
    </main>
</body>

</html>
